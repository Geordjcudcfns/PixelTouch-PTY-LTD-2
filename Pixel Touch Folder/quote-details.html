<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get a Quote — Step 3</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="nav-wrapper">
    <div class="nav-left">
      <a href="index.html">Home</a>

      <div class="dropdown">
        <button class="dropbtn">Services</button>
        <div class="dropdown-content">
          <a href="cctv.html">CCTV</a>
          <a href="repair.html">Repair & Maintenance</a>
          <a href="tv-install.html">TV Installations</a>
          <a href="appliance.html">Appliance Installation</a>
          <a href="other.html">Other</a>
        </div>
      </div>
    </div>

    <div class="logo">PixelTouch PTY LTD</div>

    <div class="nav-right">
      <a href="pricing.html">Pricing</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</header>


<section class="quote-header">
  <h1>Your Details</h1>
  <p>We’ll use this information to prepare your quote.</p>
</section>

<section class="contact-body">

  <div class="contact-right">
    <form action="https://formspree.io/f/xreoanaa" method="POST">

      <input type="hidden" name="Property Type" id="propertyType">
      <input type="hidden" name="Service Type" id="serviceType">

      <label>Your Name</label>
      <input type="text" name="name" required>

      <label>Your Email</label>
      <input type="email" name="email" required>

      <label>Your Phone</label>
      <input type="text" name="phone" required>

      <label>Suburb / Location</label>
      <input type="text" name="location" required>

      <label>Tell us a bit more about the job</label>
      <textarea name="message" rows="6" required></textarea>

      <button type="submit" class="cta">Request Quote</button>
    </form>

    <a href="quote-service.html" class="back-link">← Back to service type</a>
  </div>

</section>

<script>
// Read URL parameters
const params = new URLSearchParams(window.location.search);
document.getElementById("propertyType").value = params.get("property") || "";
document.getElementById("serviceType").value = params.get("service") || "";
</script>

</body>
</html>
