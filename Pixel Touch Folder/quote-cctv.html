<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CCTV Quote — PixelTouch</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background:#0a0f1a; color:#fff; }
    .hero {
      padding:80px 20px;
      text-align:center;
      background:linear-gradient(135deg,#001f3f,#003a70);
      color:#fff;
    }
    .stack {
      max-width:1100px;
      margin:40px auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
      padding:0 20px;
    }
    .stack img {
      width:100%;
      height:420px;
      object-fit:cover;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }
    .form-box {
      background:#ffffff10;
      backdrop-filter:blur(10px);
      padding:30px;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }
    input, textarea {
      width:100%;
      padding:14px;
      margin-bottom:14px;
      border-radius:8px;
      border:none;
    }
  </style>
</head>

<body>

<header>…</header>

<section class="hero">
  <h1>📹 CCTV Installation Quote</h1>
  <p>Advanced Dahua security systems tailored to your property.</p>
</section>

<section class="stack">

  <img src="https://images.pexels.com/photos/5380665/pexels-photo-5380665.jpeg">

  <form class="form-box" action="https://formspree.io/f/xreoanaa" method="POST">
    <h2>Request Your CCTV Quote</h2>
    <p>We design coverage, angles, blind‑spot elimination and camera placement.</p>

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="phone" placeholder="Phone" required>
    <input type="text" name="cameras" placeholder="Number of Cameras" required>
    <textarea name="details" rows="6" placeholder="Tell us about your property"></textarea>

    <button class="cta" type="submit">Submit CCTV Quote</button>
  </form>

</section>

</body>
</html>
