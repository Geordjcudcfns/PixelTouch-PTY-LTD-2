<section class="quote-header">
  <h1>Your Repair Details</h1>
  <p>Tell us what needs fixing and we’ll prepare your quote.</p>
</section>

<section class="contact-body">

  <div class="contact-right">
    <form action="https://formspree.io/f/xreoanaa" method="POST">

      <input type="hidden" name="Repair Type" id="repairType">

      <label>Your Name</label>
      <input type="text" name="name" required>

      <label>Your Email</label>
      <input type="email" name="email" required>

      <label>Your Phone</label>
      <input type="text" name="phone" required>

      <label>Suburb / Location</label>
      <input type="text" name="location" required>

      <label>Describe the issue</label>
      <textarea name="message" rows="6" required></textarea>

      <button type="submit" class="cta">Request Repair Quote</button>
    </form>
  </div>

</section>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("repairType").value = params.get("repair") || "";
</script>
